<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pong Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      flex-direction: column;
    }

    h1 {
      margin-bottom: 10px;
    }

    .menu {
      margin-bottom: 15px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: cyan;
      color: black;
      font-weight: bold;
    }

    canvas {
      background: #0f3460;
      border: 2px solid cyan;
      display: none;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<h1>Pong Game</h1>

<div id="menu" class="menu">
  <button id="single">Single Player</button>
  <button id="multi">Multiplayer</button>
</div>

<canvas id="game" width="800" height="500"></canvas>

<script src="game.js"></script>

</body>
</html>
